<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Daryl - Achievements</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-blue: #0066cc;
            --dark-blue: #003366;
            --black: #0a0a0a;
            --text-light: #f0f0f0;
        }

        body {
            background: linear-gradient(to bottom, var(--black), var(--dark-blue));
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--primary-blue);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-light);
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 2rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-blue);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        section {
            padding: 4rem 5%;
            min-height: 90vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 3rem;
            color: var(--primary-blue);
            position: relative;
            text-align: center;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--primary-blue);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid var(--primary-blue);
            border-radius: 10px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(10, 10, 10, 0.8);
            border-color: var(--primary-blue);
        }

        .card-img {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-img img {
            transform: scale(1.05);
        }

        .card h3 {
            color: var(--primary-blue);
            margin-bottom: 0.8rem;
            font-size: 1.2rem;
        }

        .card .date {
            font-size: 0.9rem;
            color: #b0b0b0;
            margin-bottom: 0.8rem;
        }

        .card p {
            line-height: 1.6;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                margin-top: 1rem;
            }
            nav {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">Prince Daryl</div>

            <a href="index.html">Home</a>

            <a href="achievements.html" class="active">Achievements/Projects</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

</body>
</html>
