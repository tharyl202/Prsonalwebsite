<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Daryl - Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-blue: #0066cc;
            --dark-blue: #003366;
            --black: #0a0a0a;
            --text-light: #f0f0f0;
        }

        body {
            background: linear-gradient(to bottom, var(--black), var(--dark-blue));
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--primary-blue);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-light);
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 2rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-blue);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        section {
            padding: 4rem 5%;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 3rem;
            color: var(--primary-blue);
            position: relative;
            text-align: center;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--primary-blue);
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2.5rem;
            justify-items: center;
        }

        .social-card {
            width: 200px;
            padding: 2rem;
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid var(--primary-blue);
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .social-card:hover {
            background: rgba(10, 10, 10, 0.8);
            transform: scale(1.05);
            border-color: var(--primary-blue);
        }

        .social-card i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Platform-specific colors */
        .facebook i { color: #1877f2; }
        .tiktok i { color: #000000; }
        .instagram i { color: #e4405f; }

        .social-card h3 {
            margin-bottom: 0.8rem;
            color: var(--primary-blue);
        }

        .social-card a {
            color: var(--text-light);
            text-decoration: none;
            padding: 0.5rem 1rem;
            background: var(--primary-blue);
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .social-card a:hover {
            background: #004a99;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                margin-top: 1rem;
            }
            nav {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">Prince Daryl</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html"> Achievements</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <section id="contact">
        <div class="container">
            <h2 class="section-title">Connect With Me</h2>
            <div class="social-links">
                <!-- Facebook Card -->
                <div class="social-card facebook">
                    <i class="fab fa-facebook-square"></i>
                    <h3>Facebook</h3>
                    <a href="https://www.facebook.com/your-profile-url" target="_blank">Visit Profile</a>
                </div>


                <!-- Instagram Card -->
                <div class="social-card instagram">
                    <i class="fab fa-instagram"></i>
                    <h3>Instagram</h3>
                    <a href="https://www.instagram.com/your-username" target="_blank">Visit Profile</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
