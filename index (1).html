<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Prince Daryl - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-blue: #0066cc;
            --dark-blue: #003366;
            --black: #0a0a0a;
            --text-light: #f0f0f0;
        }

        body {
            background: linear-gradient(to bottom, var(--black), var(--dark-blue));
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--primary-blue);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-light);
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 2rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-blue);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        section {
            padding: 4rem 5%;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        #home {
            display: flex;
            align-items: center;
            gap: 4rem;
            text-align: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .profile-img {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--primary-blue);
            transition: transform 0.5s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .home-content h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--primary-blue);
        }

        .quote {
            font-size: 1.2rem;
            font-style: italic;
            margin-top: 1rem;
            padding: 1rem;
            border-left: 3px solid var(--primary-blue);
            background: rgba(0, 102, 204, 0.1);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                margin-top: 1rem;
            }
            nav {
                flex-direction: column;
                align-items: flex-start;
            }
            #home {
                gap: 2rem;
            }
            .profile-img {
                width: 250px;
                height: 250px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">Prince Daryl</div>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html"> Achievements</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section id="home">
        <div class="profile-img">
            <img src="/1766598904983.jpg" alt="[Your Name] Profile Picture">
        </div>
        <div class="home-content"><h1>Prince Daryl V. Padernal</h1>
        <hr>
            <h1> My Personal Website</h1>

         
            </div>
        </div>
    </section>
</body>
</html>
